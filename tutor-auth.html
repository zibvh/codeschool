<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tutor Login — codeSchool</title>
<meta name="description" content="Tutor portal login for codeSchool instructors.">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#050B1A">
<link rel="icon" type="image/png" href="codeSchool.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dark:#050B1A;--dark2:#0A1226;
  --amber:#E89020;--amber-dim:rgba(232,144,32,.12);--amber-glow:rgba(232,144,32,.35);
  --white:#fff;--gray:#8892B0;--gray2:#4A5578;--border:rgba(255,255,255,.08);
  --green:#0693e3;
  --display:'Syne',sans-serif;--mono:'DM Mono',monospace;--body:'Outfit',sans-serif;
  --radius:16px;--radius-sm:10px;
}
html{scroll-behavior:smooth;}
body{
  font-family:var(--body);background:var(--dark);color:var(--white);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:1.5rem 1rem;overflow-x:hidden;position:relative;
}
/* Background */
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(232,144,32,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(232,144,32,.03) 1px,transparent 1px);
  background-size:40px 40px;}
.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.bg-orb1{width:650px;height:650px;background:rgba(196,123,26,.07);top:-200px;right:-200px;animation:drift1 14s ease-in-out infinite alternate;}
.bg-orb2{width:500px;height:500px;background:rgba(6,147,227,.05);bottom:-100px;left:-150px;animation:drift2 18s ease-in-out infinite alternate;}
@keyframes drift1{from{transform:translate(0,0);}to{transform:translate(-50px,35px);}}
@keyframes drift2{from{transform:translate(0,0);}to{transform:translate(35px,-45px);}}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.9rem 2rem;background:rgba(5,11,26,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo img{height:36px;width:auto;display:block;}
  .logo{font-family:var(--display);font-weight:800;font-size:1.1rem;color:var(--white);text-decoration:none;letter-spacing:-.03em;}
.logo span{color:var(--amber);}
.nav-links{display:flex;align-items:center;gap:1rem;}
.nav-back{font-family:var(--mono);font-size:.72rem;color:var(--gray);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:.35rem;}
.nav-back:hover{color:var(--white);}
.nav-student-link{font-family:var(--mono);font-size:.7rem;color:var(--gray);text-decoration:none;background:rgba(255,255,255,.05);border:1px solid var(--border);padding:.4rem .9rem;border-radius:8px;transition:all .2s;}
.nav-student-link:hover{color:var(--white);background:rgba(255,255,255,.1);}

/* Wrapper */
.auth-wrapper{position:relative;z-index:1;width:100%;max-width:440px;padding-top:5.5rem;padding-bottom:2rem;}

/* Header */
.auth-header{text-align:center;margin-bottom:1.75rem;}
.role-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(232,144,32,.1);border:1px solid rgba(232,144,32,.25);border-radius:100px;padding:.4rem 1rem;font-family:var(--mono);font-size:.68rem;color:var(--amber);letter-spacing:.04em;text-transform:uppercase;margin-bottom:1rem;}
.auth-headline{font-family:var(--display);font-size:1.9rem;font-weight:800;letter-spacing:-.04em;line-height:1.1;margin-bottom:.4rem;}
.auth-sub{font-family:var(--mono);font-size:.7rem;color:var(--gray);letter-spacing:.04em;text-transform:uppercase;}

/* Card */
.auth-card{background:rgba(10,18,38,.6);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);}
.card-header{background:linear-gradient(135deg,rgba(196,123,26,.15),rgba(232,144,32,.05));border-bottom:1px solid rgba(232,144,32,.15);padding:1.25rem 1.6rem;display:flex;align-items:center;gap:.75rem;}
.card-header-icon{width:36px;height:36px;background:rgba(232,144,32,.15);border:1px solid rgba(232,144,32,.25);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card-header-icon svg{width:18px;height:18px;stroke:var(--amber);}
.card-header-text h3{font-family:var(--display);font-size:.95rem;font-weight:700;letter-spacing:-.02em;}
.card-header-text p{font-family:var(--mono);font-size:.62rem;color:var(--gray);margin-top:.15rem;}

/* Notice box */
.notice-box{background:rgba(232,144,32,.07);border:1px solid rgba(232,144,32,.2);border-radius:var(--radius-sm);padding:.9rem 1rem;margin-bottom:1.1rem;display:flex;gap:.7rem;align-items:flex-start;}
.notice-body{font-family:var(--mono);font-size:.67rem;color:rgba(232,144,32,.85);line-height:1.75;}
.notice-body strong{color:var(--white);}

/* Form */
.card-body{padding:1.6rem;}
.form-group{margin-bottom:1.1rem;}
.form-label{display:block;font-family:var(--mono);font-size:.65rem;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.45rem;}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-icon{position:absolute;left:.9rem;pointer-events:none;opacity:.45;display:flex;align-items:center;}
.input-icon svg{width:16px;height:16px;stroke:var(--gray);}
.form-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);color:var(--white);font-family:var(--body);font-size:.88rem;padding:.75rem 1rem;transition:border-color .2s,background .2s,box-shadow .2s;outline:none;-webkit-appearance:none;}
.has-icon .form-input{padding-left:2.6rem;}
.has-toggle .form-input{padding-right:3.4rem;}
.form-input::placeholder{color:var(--gray2);}
.form-input:focus{border-color:rgba(232,144,32,.5);background:rgba(232,144,32,.04);box-shadow:0 0 0 3px rgba(232,144,32,.1);}
.toggle-pw{position:absolute;right:.8rem;background:none;border:none;color:var(--gray);cursor:pointer;transition:color .2s;padding:.35rem .4rem;display:flex;align-items:center;}
.toggle-pw:hover{color:var(--white);}
.toggle-pw svg{width:16px;height:16px;stroke:currentColor;}
.forgot-link{display:inline-flex;align-items:center;gap:.3rem;font-family:var(--mono);font-size:.63rem;color:var(--gray);text-decoration:none;margin-top:.55rem;transition:color .2s;}
.forgot-link:hover{color:var(--amber);}
.forgot-link svg{width:11px;height:11px;stroke:currentColor;opacity:.7;}
.btn-submit{width:100%;padding:.9rem 1rem;border:none;border-radius:var(--radius-sm);font-family:var(--display);font-size:.92rem;font-weight:700;letter-spacing:-.01em;cursor:pointer;transition:opacity .2s,transform .15s,box-shadow .2s;margin-top:.25rem;background:linear-gradient(135deg,#8B4A00,var(--amber));color:#fff;box-shadow:0 4px 24px rgba(196,123,26,.35);}
.btn-submit:active{transform:scale(.98);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}

/* Info panels */
.info-strip{display:flex;gap:.75rem;margin-top:1.5rem;}
.info-item{flex:1;background:rgba(10,18,38,.8);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;}
.info-item .info-num{font-family:var(--display);font-size:1.5rem;font-weight:800;color:var(--amber);line-height:1;}
.info-item .info-lbl{font-family:var(--mono);font-size:.6rem;color:var(--gray);margin-top:.3rem;text-transform:uppercase;letter-spacing:.06em;}

/* Student CTA */
.student-cta{margin-top:1.5rem;text-align:center;font-family:var(--mono);font-size:.7rem;color:var(--gray);}
.student-cta a{color:var(--green);text-decoration:none;}
.student-cta a:hover{text-decoration:underline;}

/* Spinner / Toast */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:.5rem;vertical-align:middle;}
.toast{position:fixed;top:0;left:0;right:0;background:var(--dark2);border-bottom:3px solid rgba(6,147,227,.5);padding:.7rem 1.5rem;font-family:var(--mono);font-size:.75rem;color:var(--white);z-index:9999;transform:translateY(-100%);opacity:0;transition:transform .25s ease,opacity .25s;box-shadow:0 4px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:.6rem;min-height:44px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-bottom-color:rgba(6,147,227,.7);background:rgba(5,25,12,.97);}
.toast.error{border-bottom-color:rgba(232,144,32,.7);background:rgba(28,5,8,.97);}

@media(max-width:520px){body{padding:1rem .75rem;justify-content:flex-start;}.auth-wrapper{padding-top:5rem;}.auth-headline{font-size:1.5rem;}nav{padding:.75rem 1rem;}.info-strip{flex-direction:column;}}
</style>
</head>
<body>
<div id="page-loader" style="position:fixed;inset:0;z-index:9999;background:#050B1A;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;transition:opacity .4s;">
  <img src="mra.png" alt="codeSchool" style="height:56px;width:auto;animation:loaderPulse 1.5s ease-in-out infinite;">
  <div style="width:180px;height:2px;background:rgba(6,147,227,.15);border-radius:2px;overflow:hidden;">
    <div style="height:100%;background:#0693e3;border-radius:2px;animation:loaderBar 1.5s ease-in-out infinite;"></div>
  </div>
</div>
<style>
@keyframes loaderPulse{0%,100%{opacity:.6;transform:scale(.97)}50%{opacity:1;transform:scale(1)}}
@keyframes loaderBar{0%{width:0;margin-left:0}60%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
</style>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>

<nav>
  <a href="index.html" class="logo"><img src="mra.png" alt="codeSchool" style="height:36px;width:auto;object-fit:contain;display:block;"></a>
  <div class="nav-links">
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Home
    </a>
  </div>
</nav>

<div class="auth-wrapper">

  <div class="auth-header">
    <div class="role-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
      Instructor Portal
    </div>
    <div class="auth-headline">Tutor Access</div>
    <div class="auth-sub">Sign in to your instructor dashboard</div>
  </div>

  <div class="auth-card">
    <div class="card-header">
      <div class="card-header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>
      <div class="card-header-text">
        <h3>Staff Login</h3>
        <p>Accounts are provisioned by the admin team</p>
      </div>
    </div>

    <div class="card-body">
      <div class="notice-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <div class="notice-body">
          <strong>No self-registration for tutors.</strong><br>
          Your account is created by codeSchool admin. If you haven't received your credentials, contact <a href="mailto:codeSchool@gmail.com" style="color:var(--amber);text-decoration:none;">codeSchool@gmail.com</a>.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap has-icon">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><polyline points="2,4 12,13 22,4"></polyline></svg></span>
          <input type="email" class="form-input" placeholder="tutor@example.com" id="t-email" autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap has-icon has-toggle">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"></circle><path d="M21 2l-9.6 9.6"></path><path d="M15.5 7.5l3 3L22 7l-3-3"></path></svg></span>
          <input type="password" class="form-input" placeholder="Your password" id="t-pw" autocomplete="current-password">
          <button class="toggle-pw" onclick="togglePw('t-pw',this)" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
        <a href="#" class="forgot-link" id="forgot-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          Forgot password?
        </a>
      </div>

      <button class="btn-submit" id="btn-login" onclick="handleLogin()" data-label="Sign In to Dashboard →">
        Sign In to Dashboard →
      </button>
    </div>
  </div>


</div>

<div id="toast" class="toast"></div>

<script>
const EYE_ON=`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
const EYE_OFF=`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
function togglePw(id,btn){const inp=document.getElementById(id);const show=inp.type==='password';inp.type=show?'text':'password';btn.innerHTML=show?EYE_OFF:EYE_ON;}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');setTimeout(()=>t.classList.remove('show'),3200);}
function setLoading(btn,loading){btn.disabled=loading;btn.innerHTML=loading?'<span class="spinner"></span>Signing in…':(btn.dataset.label||btn.textContent);}
// Safe stub before module loads
window.handleLogin=function(){showToast('App loading — please wait a moment.','error');};
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, sendPasswordResetEmail,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, enableNetwork, doc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDjSs8AoDt6bG4-_FxWJbRLFM0tyR2S2D0",
  authDomain: "codeschool-41f52.firebaseapp.com",
  projectId: "codeschool-41f52",
  storageBucket: "codeschool-41f52.firebasestorage.app",
  messagingSenderId: "224975256200",
  appId: "1:224975256200:web:68ffc1a1160f3315d77d3d"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let _loginInProgress = false;

// Auto-redirect if already logged in as tutor
onAuthStateChanged(auth, async (user) => {
  if (!user || _loginInProgress) return;
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) return;
    const role = snap.data().role;
    if (role === 'tutor') window.location.href = 'tutor-dashboard.html';
  } catch(e) {}
});

// ── LOGIN ─────────────────────────────────────────────────────────
window.handleLogin = async function() {
  const email = document.getElementById('t-email').value.trim();
  const pw    = document.getElementById('t-pw').value;
  const btn   = document.getElementById('btn-login');

  if (!email || !pw) { showToast('Please enter your email and password.', 'error'); return; }

  setLoading(btn, true);
  _loginInProgress = true;

  try {
    try { await enableNetwork(db); } catch(_) {}
    const cred = await signInWithEmailAndPassword(auth, email, pw);
    const snap = await getDoc(doc(db, 'users', cred.user.uid));

    if (!snap.exists()) {
      _loginInProgress = false;
      showToast('Account not found. Contact your admin.', 'error');
      await signOut(auth); setLoading(btn, false); return;
    }

    const profile = snap.data();

    if (profile.role !== 'tutor') {
      _loginInProgress = false;
      showToast('This is not a tutor account.', 'error');
      await signOut(auth); setLoading(btn, false); return;
    }

    if (profile.status === 'suspended') {
      _loginInProgress = false;
      showToast('Account suspended. Contact admin.', 'error');
      await signOut(auth); setLoading(btn, false); return;
    }

    if (profile.status === 'pending') {
      _loginInProgress = false;
      showToast('Account pending admin activation. Check your email for updates.', 'error');
      await signOut(auth); setLoading(btn, false); return;
    }

    _loginInProgress = false;
    showToast('Welcome back! Loading your dashboard…', 'success');
    setTimeout(() => { window.location.href = 'tutor-dashboard.html'; }, 800);

  } catch(e) {
    const msgs = {
      'auth/user-not-found':     'No account with this email.',
      'auth/wrong-password':     'Incorrect password.',
      'auth/invalid-email':      'Invalid email address.',
      'auth/too-many-requests':  'Too many attempts. Try again later.',
      'auth/invalid-credential': 'Email or password is incorrect.',
    };
    _loginInProgress = false;
    showToast(msgs[e.code] || 'Sign-in failed — please try again', 'error');
    setLoading(btn, false);
  }
};

// ── PASSWORD RESET ────────────────────────────────────────────────
document.getElementById('forgot-link').addEventListener('click', async e => {
  e.preventDefault();
  const email = document.getElementById('t-email').value.trim();
  if (!email) { showToast('Enter your email first, then click Forgot password.', 'error'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showToast('Password reset email sent — check your inbox.', 'success');
  } catch(e) {
    showToast('Could not send reset email. Check the address and try again.', 'error');
  }
});

// Enter key support
document.getElementById('t-pw').addEventListener('keydown', e => { if (e.key === 'Enter') window.handleLogin(); });
document.getElementById('t-email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('t-pw').focus(); });
</script>
<script>
window.addEventListener('load',function(){
  var l=document.getElementById('page-loader');
  if(l){l.style.opacity='0';setTimeout(function(){l.style.display='none'},400);}
});
</script>
</body>
</html>
