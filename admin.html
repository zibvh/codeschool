<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>codeSchool — Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root {
  --blue:#0693e3;--blue-mid:#0693e3;--blue-glow:#0693e3;
  --red:#cf2e2e;--red-bright:#ff6900;
  --white:#ffffff;--dark:#000000;--dark2:#1a1a1a;--dark3:#222222;
  --surface:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);
  --gray:#abb8c3;--gray2:#8ed1fc;
  --green:#0693e3;--amber:#fcb900;--orange:#ff6900;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;--body:'Outfit',sans-serif;
  --nav-h:60px;--bottom-h:64px;
}
html{scroll-behavior:smooth;}
body{
  font-family:var(--body);background:var(--dark);color:var(--white);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;position:relative;overflow:hidden;
}
/* Subtle background */
.bg-noise{
  position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}
@media (max-width: 768px) {
  .two-col {
    grid-template-columns: 1fr !important;
    gap: 1rem;
  }
  
  .stats-grid {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  
  .courses-grid, .browse-grid {
    grid-template-columns: 1fr !important;
  }
  
  .cpc-footer {
    flex-direction: column;
    gap: 0.5rem;
  }
  
  .cpc-footer .btn {
    width: 100%;
    text-align: center;
  }
}

@media (max-width: 480px) {
  .stats-grid {
    grid-template-columns: 1fr !important;
  }
  
  .welcome-banner {
    padding: 1.25rem !important;
  }
  
  .welcome-title {
    font-size: 1.2rem !important;
  }
}
.bg-line{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(6,147,227,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(6,147,227,.025) 1px,transparent 1px);
  background-size:48px 48px;
}
.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.bg-orb1{width:600px;height:600px;background:rgba(6,147,227,.05);top:-200px;right:-200px;}
.bg-orb2{width:400px;height:400px;background:rgba(5,11,26,.9);bottom:-100px;left:-150px;}

/* Wrapper */
.wrap{position:relative;z-index:1;width:100%;max-width:400px;}

/* Logo */
.logo-row{text-align:center;margin-bottom:2.25rem;}
.logo img{height:36px;width:auto;display:block;}
  .logo{font-family:var(--display);font-size:1.5rem;font-weight:800;letter-spacing:-.04em;text-decoration:none;color:var(--white);}
.logo span{color:var(--amber);}
.logo-tag{font-family:var(--mono);font-size:.6rem;letter-spacing:.14em;color:var(--gray);text-transform:uppercase;margin-top:.3rem;}

/* Card */
.card{
  background:rgba(10,18,38,.6);backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:2rem;
}
.card-title{font-family:var(--display);font-size:1.1rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.25rem;}
.card-sub{font-family:var(--mono);font-size:.65rem;color:var(--gray);margin-bottom:1.75rem;letter-spacing:.03em;}

/* Form */
.form-group{margin-bottom:1.1rem;}
.form-label{display:block;font-family:var(--mono);font-size:.63rem;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-icon{position:absolute;left:.85rem;font-size:.85rem;pointer-events:none;opacity:.45;}
.form-input{
  width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--white);
  font-family:var(--body);font-size:.88rem;padding:.72rem 1rem .72rem 2.5rem;
  transition:border-color .2s,background .2s;outline:none;
}
.form-input.no-icon{padding-left:1rem;}
.form-input::placeholder{color:var(--gray2);}
.form-input:focus{border-color:rgba(6,147,227,.45);background:rgba(6,147,227,.04);}
.has-toggle .form-input{padding-right:3rem;}
.toggle-pw{
  position:absolute;right:.75rem;background:none;border:none;
  color:var(--gray);font-family:var(--mono);font-size:.6rem;
  cursor:pointer;padding:.3rem;transition:color .2s;
}
.toggle-pw:hover{color:var(--white);}

/* Button */
.btn-submit{
  width:100%;padding:.85rem 1rem;border:none;border-radius:var(--radius-sm);
  font-family:var(--display);font-size:.9rem;font-weight:700;letter-spacing:-.01em;
  cursor:pointer;transition:opacity .2s,transform .1s;margin-top:.5rem;
  background:linear-gradient(135deg,#0466be,var(--green));
  color:#fff;box-shadow:0 4px 24px rgba(6,147,227,.25);
}
.btn-submit:active{transform:scale(.98);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:.45rem;vertical-align:middle;}

/* Back link */
.back-row{text-align:center;margin-top:1.5rem;}
.back-link{font-family:var(--mono);font-size:.65rem;color:var(--gray);text-decoration:none;transition:color .2s;letter-spacing:.02em;}
.back-link:hover{color:var(--white);}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:.75rem 1.25rem;font-family:var(--mono);font-size:.75rem;transform:translateX(130%);transition:transform .3s;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.toast.show{transform:translateX(0);}
.toast.success{border-color:rgba(6,147,227,.4);color:var(--green);}
.toast.error{border-color:rgba(232,144,32,.35);color:#FF8080;}

@media(max-width:440px){
  .card{padding:1.5rem 1.25rem;}
  body{padding:1rem .75rem;}
}
</style>
</head>
<body>
<div id="page-loader" style="position:fixed;inset:0;z-index:9999;background:#050B1A;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;transition:opacity .4s;">
  <img src="mra.png" alt="codeSchool" style="height:56px;width:auto;animation:loaderPulse 1.5s ease-in-out infinite;">
  <div style="width:180px;height:2px;background:rgba(6,147,227,.15);border-radius:2px;overflow:hidden;">
    <div style="height:100%;background:#0693e3;border-radius:2px;animation:loaderBar 1.5s ease-in-out infinite;"></div>
  </div>
</div>
<style>
@keyframes loaderPulse{0%,100%{opacity:.6;transform:scale(.97)}50%{opacity:1;transform:scale(1)}}
@keyframes loaderBar{0%{width:0;margin-left:0}60%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
</style>
<div class="bg-noise"></div>
<div class="bg-line"></div>
<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>

<div class="wrap">
  <div class="logo-row">
    <a href="index.html" class="logo"><img src="mra.png" alt="codeSchool" style="height:36px;width:auto;object-fit:contain;display:block;"></a>
    <div class="logo-tag">Secure Portal</div>
  </div>

  <div class="card">
    <div class="card-title">Staff Access</div>
    <div class="card-sub">Authorised personnel only. This session is logged.</div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" class="form-input" id="a-email" placeholder="your@codeSchool.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap has-toggle">
        <span class="input-icon">🔑</span>
        <input type="password" class="form-input" id="a-pw" placeholder="Access password" autocomplete="current-password">
        <button class="toggle-pw" type="button" onclick="togglePw()">show</button>
      </div>
    </div>

    <button class="btn-submit" id="btn-login" onclick="handleLogin()" data-label="Continue →">Continue →</button>
  </div>

  <div class="back-row">
    <a href="index.html" class="back-link">← Return to site</a>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
function togglePw(){
  const inp = document.getElementById('a-pw');
  const btn = inp.parentNode.querySelector('.toggle-pw');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'show' : 'hide';
}
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type||'');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
function setLoading(loading){
  const btn = document.getElementById('btn-login');
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>Verifying…' : (btn.dataset.label || 'Continue →');
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDjSs8AoDt6bG4-_FxWJbRLFM0tyR2S2D0",
  authDomain:        "codeschool-41f52.firebaseapp.com",
  projectId:         "codeschool-41f52",
  storageBucket:     "codeschool-41f52.firebasestorage.app",
  messagingSenderId: "224975256200",
  appId:             "1:224975256200:web:68ffc1a1160f3315d77d3d"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

window.handleLogin = async function() {
  const email = document.getElementById('a-email').value.trim();
  const pw    = document.getElementById('a-pw').value;
  if (!email || !pw) { showToast('Please enter your credentials.', 'error'); return; }
  setLoading(true);
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pw);
    const snap = await getDoc(doc(db, 'users', cred.user.uid));
    if (!snap.exists() || snap.data().role !== 'admin') {
      showToast('Access denied.', 'error');
      await signOut(auth);
      setLoading(false);
      return;
    }
    showToast('Access granted.', 'success');
    setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 700);
  } catch(e) {
    const msgs = {
      'auth/user-not-found':     'No account found.',
      'auth/wrong-password':     'Incorrect password.',
      'auth/invalid-credential': 'Invalid credentials.',
      'auth/too-many-requests':  'Too many attempts. Try later.',
      'auth/invalid-email':      'Invalid email address.',
    };
    showToast(msgs[e.code] || e.message, 'error');
    setLoading(false);
  }
};

// Enter key support
document.getElementById('a-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.handleLogin();
});
document.getElementById('a-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('a-pw').focus();
});
</script>
<script>
window.addEventListener('load',function(){
  var l=document.getElementById('page-loader');
  if(l){l.style.opacity='0';setTimeout(function(){l.style.display='none'},400);}
});
</script>
</body>
</html>
