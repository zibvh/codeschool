<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign In or Sign Up — codeSchool</title>
<meta name="description" content="Create your codeSchool account or sign in to continue learning.">
<meta name="theme-color" content="#060D2B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="codeSchool">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dark:#060D2B;--dark2:#0D1845;--dark3:#111C50;
  --blue:#2B6BFF;--blue-dim:rgba(43,107,255,.12);--blue-glow:rgba(43,107,255,.4);
  --red:#D90429;--red-bright:#FF0A35;--red-dim:rgba(217,4,41,.12);
  --white:#fff;--gray:#8892B0;--gray2:#4A5578;--border:rgba(255,255,255,.08);
  --green:#22C55E;
  --display:'Syne',sans-serif;--mono:'DM Mono',monospace;--body:'Outfit',sans-serif;
  --radius:16px;--radius-sm:10px;
}
html{scroll-behavior:smooth;}
body{
  font-family:var(--body);background:var(--dark);color:var(--white);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:1.5rem 1rem;overflow-x:hidden;position:relative;
}

/* ── Background ── */
.bg-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(43,107,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(43,107,255,.04) 1px,transparent 1px);
  background-size:40px 40px;
}
.bg-orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;}
.bg-orb1{width:600px;height:600px;background:rgba(43,107,255,.09);top:-150px;right:-150px;animation:drift1 12s ease-in-out infinite alternate;}
.bg-orb2{width:500px;height:500px;background:rgba(217,4,41,.07);bottom:-100px;left:-100px;animation:drift2 15s ease-in-out infinite alternate;}
@keyframes drift1{from{transform:translate(0,0);}to{transform:translate(-40px,30px);}}
@keyframes drift2{from{transform:translate(0,0);}to{transform:translate(30px,-40px);}}

/* ── Cursor ── */
.cursor{position:fixed;width:8px;height:8px;background:var(--red-bright);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cursor-ring{position:fixed;width:28px;height:28px;border:1.5px solid rgba(43,107,255,.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);}

/* ── Nav ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem 2rem;
  background:rgba(6,13,43,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{font-family:var(--display);font-weight:800;font-size:1.1rem;color:var(--white);text-decoration:none;letter-spacing:-.03em;}
.logo span{color:var(--red-bright);}
.nav-back{font-family:var(--mono);font-size:.72rem;color:var(--gray);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:.35rem;}
.nav-back:hover{color:var(--white);}

/* ── Wrapper ── */
.auth-wrapper{position:relative;z-index:1;width:100%;max-width:460px;padding-top:5.5rem;padding-bottom:2rem;}

/* ── Header ── */
.auth-header{text-align:center;margin-bottom:1.75rem;}
.auth-headline{font-family:var(--display);font-size:1.9rem;font-weight:800;letter-spacing:-.04em;line-height:1.1;margin-bottom:.4rem;}
.auth-sub{font-family:var(--mono);font-size:.7rem;color:var(--gray);letter-spacing:.04em;text-transform:uppercase;}

/* ── Auth card ── */
.auth-card{
  background:rgba(13,24,69,.6);backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
}

/* ── Tab bar ── */
.tab-bar{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);background:rgba(0,0,0,.15);}
.tab-btn{
  padding:.95rem 1rem;background:transparent;border:none;color:var(--gray);
  font-family:var(--body);font-size:.85rem;font-weight:600;cursor:pointer;
  position:relative;transition:color .2s;letter-spacing:-.01em;
}
.tab-btn::after{content:'';position:absolute;bottom:0;left:50%;right:50%;height:2px;border-radius:2px 2px 0 0;background:var(--blue);transition:left .25s,right .25s;}
.tab-btn.active{color:var(--white);background:rgba(255,255,255,.02);}
.tab-btn.active::after{left:12%;right:12%;}

/* ── Tab panels ── */
.tab-panel{display:none;padding:1.75rem 1.6rem;}
.tab-panel.active{display:block;}

/* ── Form elements ── */
.form-group{margin-bottom:1.1rem;}
.form-label{
  display:block;font-family:var(--mono);font-size:.65rem;color:var(--gray);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:.45rem;
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-icon{position:absolute;left:.9rem;pointer-events:none;opacity:.45;display:flex;align-items:center;}
.input-icon svg{width:16px;height:16px;stroke:var(--gray);}
.form-input{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-sm);color:var(--white);
  font-family:var(--body);font-size:.88rem;padding:.75rem 1rem;
  transition:border-color .2s,background .2s,box-shadow .2s;outline:none;-webkit-appearance:none;
}
.has-icon .form-input{padding-left:2.6rem;}
.has-toggle .form-input{padding-right:3.4rem;}
.form-input::placeholder{color:var(--gray2);}
.form-input:focus{
  border-color:rgba(43,107,255,.5);
  background:rgba(43,107,255,.05);
  box-shadow:0 0 0 3px rgba(43,107,255,.1);
}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
.form-input.err{border-color:rgba(255,10,53,.5);animation:shake .3s ease;box-shadow:0 0 0 3px rgba(255,10,53,.1);}

.toggle-pw{
  position:absolute;right:.8rem;background:none;border:none;
  color:var(--gray);cursor:pointer;transition:color .2s;padding:.35rem .4rem;
  display:flex;align-items:center;
}
.toggle-pw:hover{color:var(--white);}
.toggle-pw svg{width:16px;height:16px;stroke:currentColor;}

/* ── Password strength ── */
.pw-strength{display:flex;gap:4px;margin-top:.5rem;}
.pw-bar{height:3px;flex:1;border-radius:4px;background:rgba(255,255,255,.08);transition:background .3s;}
.pw-bar.weak{background:var(--red-bright);}
.pw-bar.mid{background:#F59E0B;}
.pw-bar.strong{background:var(--green);}
.pw-hint{font-family:var(--mono);font-size:.6rem;color:var(--gray);margin-top:.3rem;}

/* ── Checkbox ── */
.check-row{display:flex;align-items:flex-start;gap:.65rem;margin-bottom:1.1rem;}
.check-row input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin-top:2px;accent-color:var(--blue);cursor:pointer;}
.check-row label{font-family:var(--mono);font-size:.65rem;color:var(--gray);line-height:1.6;cursor:pointer;}
.check-row a{color:var(--blue);text-decoration:none;}
.check-row a:hover{text-decoration:underline;}

/* ── Forgot link ── */
.forgot-link{
  display:inline-flex;align-items:center;gap:.3rem;
  font-family:var(--mono);font-size:.63rem;
  color:var(--gray);text-decoration:none;
  margin-top:.55rem;transition:color .2s;
}
.forgot-link:hover{color:var(--blue);}
.forgot-link svg{width:11px;height:11px;stroke:currentColor;opacity:.7;}

/* ── Submit button ── */
.btn-submit{
  width:100%;padding:.9rem 1rem;border:none;border-radius:var(--radius-sm);
  font-family:var(--display);font-size:.92rem;font-weight:700;letter-spacing:-.01em;
  cursor:pointer;position:relative;overflow:hidden;
  transition:opacity .2s,transform .15s,box-shadow .2s;margin-top:.25rem;
}
.btn-submit:active{transform:scale(.98);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
.btn-blue{
  background:linear-gradient(135deg,#1A4FD8,#3B7FFF);color:#fff;
  box-shadow:0 4px 24px rgba(43,107,255,.35);
}
.btn-blue:hover:not(:disabled){box-shadow:0 6px 30px rgba(43,107,255,.5);}

/* ── Social buttons ── */
.or-divider{display:flex;align-items:center;gap:.75rem;margin:.9rem 0;}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}
.or-divider span{font-family:var(--mono);font-size:.6rem;color:var(--gray2);letter-spacing:.08em;text-transform:uppercase;}
.btn-google,.btn-github{
  width:100%;display:flex;align-items:center;justify-content:center;gap:.7rem;
  padding:.82rem 1rem;border-radius:var(--radius-sm);
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  color:var(--white);font-family:var(--body);font-size:.88rem;font-weight:500;
  cursor:pointer;transition:background .2s,border-color .2s,box-shadow .2s;
}
.btn-google:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.22);box-shadow:0 4px 16px rgba(0,0,0,.2);}
.btn-github:hover{background:rgba(36,41,47,.7);border-color:rgba(255,255,255,.25);box-shadow:0 4px 16px rgba(0,0,0,.25);}
.social-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}

/* ── Helper text ── */
.helper-txt{text-align:center;font-family:var(--mono);font-size:.65rem;color:var(--gray);margin-top:1.1rem;}
.helper-txt a{color:var(--blue);text-decoration:none;}
.helper-txt a:hover{text-decoration:underline;}

/* ── Email hint banner ── */
.email-hint{
  background:rgba(43,107,255,.07);border:1px solid rgba(43,107,255,.18);
  border-radius:var(--radius-sm);padding:.7rem 1rem;margin-bottom:1.1rem;
  font-family:var(--mono);font-size:.67rem;color:var(--gray);line-height:1.6;
}
.email-hint strong{color:var(--white);}

/* ── Spinner ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  display:inline-block;width:13px;height:13px;
  border:2px solid rgba(255,255,255,.25);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;
  margin-right:.5rem;vertical-align:middle;
}

/* ── Toast ── */
.toast{
  position:fixed;top:0;left:0;right:0;
  background:var(--dark2);
  border-bottom:3px solid rgba(43,107,255,.5);
  padding:.7rem 1.5rem;
  font-family:var(--mono);font-size:.75rem;color:var(--white);
  z-index:9999;
  transform:translateY(-100%);opacity:0;
  transition:transform .25s ease,opacity .25s;
  box-shadow:0 4px 24px rgba(0,0,0,.4);
  display:flex;align-items:center;gap:.6rem;
  min-height:44px;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-bottom-color:rgba(34,197,94,.7);background:rgba(5,25,12,.97);}
.toast.error{border-bottom-color:rgba(255,10,53,.7);background:rgba(28,5,8,.97);}
.toast.warning{border-bottom-color:rgba(245,158,11,.7);background:rgba(28,20,5,.97);}

/* ── Responsive ── */
@media(max-width:520px){
  body{padding:1rem .75rem;padding-top:.5rem;justify-content:flex-start;}
  .auth-wrapper{padding-top:5rem;}
  .auth-headline{font-size:1.5rem;}
  .form-row{grid-template-columns:1fr;}
  .tab-panel{padding:1.4rem 1.1rem;}
  nav{padding:.75rem 1rem;}
}
@media(max-width:360px){
  .auth-card{border-radius:12px;}
}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>

<nav>
  <a href="index.html" class="logo">code<span>S</span>chool</a>
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Home
  </a>
</nav>

<div class="auth-wrapper">

  <div class="auth-header">
    <div class="auth-headline">Welcome back</div>
    <div class="auth-sub">Sign in or create your account</div>
  </div>

  <div class="auth-card">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Log In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <div class="tab-panel active" id="panel-login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap has-icon">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><polyline points="2,4 12,13 22,4"></polyline></svg></span>
          <input type="email" class="form-input" placeholder="you@example.com" id="login-email" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap has-icon has-toggle">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"></circle><path d="M21 2l-9.6 9.6"></path><path d="M15.5 7.5l3 3L22 7l-3-3"></path></svg></span>
          <input type="password" class="form-input" placeholder="Your password" id="login-pw" autocomplete="current-password">
          <button class="toggle-pw" onclick="togglePw('login-pw',this)" type="button" title="Show/hide password"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
        </div>
        <a href="#" class="forgot-link" id="forgot-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          Forgot password?
        </a>
      </div>
      <button class="btn-submit btn-blue" id="btn-login" onclick="handleLogin()" data-label="Log In →">Log In →</button>
      <div class="or-divider"><span>or continue with</span></div>
      <div class="social-row">
        <button class="btn-google" id="btn-login-google" onclick="handleGoogleSignIn()" type="button">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.83l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
          Google
        </button>
        <button class="btn-github" id="btn-login-github" onclick="handleGithubSignIn()" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </button>
      </div>
      <div class="helper-txt">No account? <a href="#" onclick="switchTab('signup');return false;">Create one free</a></div>
    </div>

    <!-- SIGN UP -->
    <div class="tab-panel" id="panel-signup">
      <div class="email-hint" style="display:flex;align-items:flex-start;gap:.4rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;flex-shrink:0;margin-right:.4rem;vertical-align:middle"><path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8"></path><polyline points="2,6 12,13 22,6"></polyline><polyline points="16 19 19 22 22 19"></polyline><line x1="19" y1="15" x2="19" y2="22"></line></svg>
        After signing up, <strong>check your inbox and spam folder</strong> for a verification link before logging in.
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" class="form-input" placeholder="Ada" id="s-fname" autocomplete="given-name">
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-input" placeholder="Okafor" id="s-lname" autocomplete="family-name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap has-icon">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><polyline points="2,4 12,13 22,4"></polyline></svg></span>
          <input type="email" class="form-input" placeholder="you@example.com" id="s-email" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <div class="input-wrap has-icon">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></span>
          <input type="tel" class="form-input" placeholder="080x xxx xxxx" id="s-phone" autocomplete="tel">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap has-icon has-toggle">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"></circle><path d="M21 2l-9.6 9.6"></path><path d="M15.5 7.5l3 3L22 7l-3-3"></path></svg></span>
          <input type="password" class="form-input" placeholder="Min. 6 characters" id="s-pw" oninput="checkStrength(this,'s-str')" autocomplete="new-password">
          <button class="toggle-pw" onclick="togglePw('s-pw',this)" type="button" title="Show/hide password"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
        </div>
        <div class="pw-strength" id="s-str"><div class="pw-bar"></div><div class="pw-bar"></div><div class="pw-bar"></div></div>
        <div class="pw-hint" id="s-str-lbl"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrap has-icon has-toggle">

<script>
// ── Cursor ──
const cur=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function a(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

const EYE_ON  = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
const EYE_OFF = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show ? EYE_OFF : EYE_ON;
  btn.style.color = show ? 'rgba(255,255,255,.8)' : 'var(--gray)';
}

function checkStrength(inp, cid) {
  const v = inp.value;
  const bars = document.querySelectorAll('#' + cid + ' .pw-bar');
  const lbl = document.getElementById(cid + '-lbl');
  let s = 0;
  if (v.length >= 6) s++;
  if (v.length >= 10) s++;
  if (/[A-Z]/.test(v) && /[0-9]/.test(v)) s++;
  bars.forEach((b, i) => { b.className = 'pw-bar'; if (i < s) b.classList.add(s===1?'weak':s===2?'mid':'strong'); });
  if (lbl) lbl.textContent = s===0?'':s===1?'Weak':s===2?'Okay':'Strong';
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (type||'');
  setTimeout(() => t.classList.remove('show'), 3200);
}

function setLoading(btn, loading) {
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>Please wait…' : (btn.dataset.label || btn.textContent);
}

// Stubs so onclick handlers never throw before Firebase loads
window.handleSignup      = function() { showToast('App is loading — please wait a moment then try again.', 'error'); };
window.handleLogin       = function() { showToast('App is loading — please wait a moment then try again.', 'error'); };
window.handleGoogleSignIn = function() { showToast('App is loading — please wait a moment then try again.', 'error'); };
window.handleGithubSignIn = function() { showToast('App is loading — please wait a moment then try again.', 'error'); };
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
  sendPasswordResetEmail, sendEmailVerification,
  GoogleAuthProvider, GithubAuthProvider,
  signInWithPopup, signInWithRedirect, getRedirectResult,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, enableNetwork, doc, setDoc, getDoc, deleteDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ✅ CORRECT
const firebaseConfig = {
    apiKey: "AIzaSyDjSs8AoDt6bG4-_FxWJbRLFM0tyR2S2D0",
    authDomain: "codeschool-41f52.firebaseapp.com",
    projectId: "codeschool-41f52",
    storageBucket: "codeschool-41f52.firebasestorage.app",
    messagingSenderId: "224975256200",
    appId: "1:224975256200:web:68ffc1a1160f3315d77d3d"
};


console.log('Firebase App Name:', app.name);
console.log('Auth Domain:', auth.config.authDomain);
console.log('API Key being used:', app.options.apiKey);


const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// Race-condition flags
let _googleSignInInProgress = false;
let _signupInProgress = false;
let _loginInProgress = false;

// ── HANDLE REDIRECT RESULT (Google / GitHub redirect flow) ──
// This runs on every page load and processes any pending redirect sign-in.
(async () => {
  try {
    const result = await getRedirectResult(auth);
    if (!result) return; // no redirect pending
    const user = result.user;
    _googleSignInInProgress = true;

    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists()) {
      const profile = snap.data();
      if (profile.status === 'suspended') {
        showToast('Account suspended. Contact support.', 'error');
        await signOut(auth); _googleSignInInProgress = false; return;
      }
      if (profile.role !== 'student') {
        showToast('Wrong Portal', 'error');
        await signOut(auth); _googleSignInInProgress = false; return;
      }
      _googleSignInInProgress = false;
      showToast('Logging in…', 'success');
      setTimeout(() => { window.location.href = 'student-dashboard.html'; }, 700);
    } else {
      // New social user — create profile
      const nameParts = (user.displayName || '').split(' ');
      const firstName = nameParts[0] || 'Student';
      const lastName  = nameParts.slice(1).join(' ') || '';
      const provider  = result.providerId === 'github.com' ? 'github' : 'google';
      await setDoc(doc(db, 'users', user.uid), {
        uid: user.uid, firstName, lastName,
        fullName: user.displayName || firstName,
        email: user.email || '', phone: '',
        role: 'student', status: 'active',
        emailVerified: true, provider,
        createdAt: serverTimestamp(),
      });
      sendWelcomeEmail(user.email, firstName);
      _googleSignInInProgress = false;
      showToast('Account created! Logging in…', 'success');
      setTimeout(() => { window.location.href = 'student-dashboard.html'; }, 900);
    }
  } catch(e) {
    if (e.code === 'auth/account-exists-with-different-credential') {
      showToast('An account already exists with this email!', 'error');
    } else if (e.code && e.code !== 'auth/popup-closed-by-user') {
      console.error('[codeSchool]', e.code, e.message);
      showToast('Sign-in failed, please try again', 'error');
    }
    _googleSignInInProgress = false;
  }
})();

// Page-load auto-redirect for already-logged-in students
onAuthStateChanged(auth, async (user) => {
  if (!user || _googleSignInInProgress || _signupInProgress || _loginInProgress) return;
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) return;
    const role = snap.data().role;
    if (role === 'student') window.location.href = 'student-dashboard.html';
    else if (role === 'admin') window.location.href = 'admin-dashboard.html';
  } catch(e) { /* offline — let user log in manually */ }
});

// ── HELPER: email validation ──
function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)
    && !/@(test\.com|fake\.com|example\.com|mailinator\.com|guerrillamail\.com|yopmail\.com|sharklasers\.com|throwam\.com|trashmail\.com|tempmail\.com|10minutemail\.com|disposablemail\.com)/i.test(email);
}

// ── HELPER: show unverified email prompt ──
function showUnverifiedPrompt(email) {
  const existing = document.getElementById('unverified-prompt');
  if (existing) existing.remove();
  const anchor = document.getElementById('login-email');
  const div = document.createElement('div');
  div.id = 'unverified-prompt';
  div.style.cssText = 'background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:.85rem 1rem;margin-top:.75rem;font-family:var(--mono);font-size:.72rem;color:#F59E0B;line-height:1.65;';
  div.innerHTML = `<svg viewBox='0 0 24 24' fill='none' stroke='#FF0A35' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round' style='width:14px;height:14px;vertical-align:middle;margin-right:.3rem'><path d='M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z'></path><polyline points='22,6 12,13 2,6'></polyline></svg> <strong>Email not verified.</strong><br>
    Check your inbox for a verification link.<br>
    Also check <strong>Spam</strong> / <strong>Promotions</strong>.<br><br>
    <button onclick="resendVerification('${email}',this)"
      style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);border-radius:6px;padding:.35rem .85rem;color:#F59E0B;font-family:var(--mono);font-size:.68rem;cursor:pointer;">
      Resend Verification Email
    </button>`;
  if (anchor) {
    const fg = anchor.closest('.form-group') || anchor.parentNode;
    if (fg) fg.insertAdjacentElement('afterend', div);
  }
  showToast('Verify your email before logging in.', 'error');
}

// ── HELPER: verify banner replaces card ──
function showVerifyBanner(email) {
  const card = document.querySelector('.auth-card');
  if (!card) return;
  card.innerHTML = `
    <div style="text-align:center;padding:2rem 1.6rem;">
      <div style="margin-bottom:1rem;"><svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:3rem;height:3rem"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg></div>
      <div style="font-family:var(--display);font-size:1.3rem;font-weight:800;margin-bottom:.6rem;">Verify Your Email</div>
      <div style="font-family:var(--mono);font-size:.78rem;color:var(--gray);line-height:1.7;margin-bottom:1rem;">
        We sent a verification link to<br>
        <strong style="color:var(--white);">${email}</strong><br><br>
        Click that link, then come back here to log in.
      </div>
      <div style="background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:1rem;font-family:var(--mono);font-size:.7rem;color:var(--gray);line-height:1.7;margin-bottom:1.25rem;">
        Don't see it? Check <strong style="color:var(--white);">Spam</strong> or <strong style="color:var(--white);">Promotions</strong>.
      </div>
      <button style="width:100%;padding:.8rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:var(--white);font-family:var(--mono);font-size:.72rem;cursor:pointer;margin-bottom:.75rem;"
        onclick="resendVerification('${email}',this)">Resend Verification Email</button>
      <a href="auth.html" style="font-family:var(--mono);font-size:.72rem;color:var(--gray);">← Back to Login</a>
    </div>`;
}

// ── LOGIN ──
window.handleLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  const btn   = document.getElementById('btn-login');
  if (!email || !pw) { showToast('Please fill in all fields.', 'error'); return; }
  setLoading(btn, true);
  try {
    try { await enableNetwork(db); } catch(_) {}
    _loginInProgress = true;
    const cred = await signInWithEmailAndPassword(auth, email, pw);

    const snapPre = await getDoc(doc(db, 'users', cred.user.uid));
    const adminVerified = snapPre.exists() && snapPre.data().isVerified === true;

    if (!cred.user.emailVerified && !adminVerified) {
      _loginInProgress = false;
      await signOut(auth);
      setLoading(btn, false);
      showUnverifiedPrompt(email);
      return;
    }

    let profile;
    if (!snapPre.exists()) {
      const pendingSnap = await getDoc(doc(db, 'pending_users', cred.user.uid));
      if (!pendingSnap.exists()) {
        _loginInProgress = false;
        showToast('Account not found. Please sign up.', 'error');
        await signOut(auth); setLoading(btn, false); return;
      }
      const pendingData = pendingSnap.data();
      const promotedData = { ...pendingData, emailVerified: true };
      await setDoc(doc(db, 'users', cred.user.uid), promotedData);
      try { await deleteDoc(doc(db, 'pending_users', cred.user.uid)); } catch(_) {}
      sendWelcomeEmail(pendingData.email, pendingData.firstName || pendingData.fullName);
      profile = promotedData;
    } else {
      profile = snapPre.data();
    }

    if (profile.status === 'suspended') {
      _loginInProgress = false;
      showToast('Account suspended. Contact support.', 'error');
      await signOut(auth); setLoading(btn, false); return;
    }
    if (profile.role !== 'student') {
      _loginInProgress = false;
      showToast('Incorrect email or password.', 'error');
      await signOut(auth); setLoading(btn, false); return;
    }

    _loginInProgress = false;
    showToast('Logging in…', 'success');
    setTimeout(() => { window.location.href = 'student-dashboard.html'; }, 700);
  } catch(e) {
    const msgs = {
      'auth/user-not-found':     'No account with this email.',
      'auth/wrong-password':     'Incorrect password.',
      'auth/invalid-email':      'Invalid email address.',
      'auth/too-many-requests':  'Too many attempts. Try again later.',
      'auth/invalid-credential': 'Email or password is incorrect.',
    };
    _loginInProgress = false;
    showToast(msgs[e.code] || 'Sign-in failed — please try again', 'error');
    setLoading(btn, false);
  }
};

// ── SIGNUP ──
window.handleSignup = async function() {
  const v = id => document.getElementById(id)?.value.trim();
  const email = v('s-email');
  if (!v('s-fname') || !v('s-lname') || !email || !v('s-phone')) { showToast('Please fill in all fields.', 'error'); return; }
  if (!isValidEmail(email)) { showToast('Please enter a real email address.', 'error'); return; }
  const pw  = document.getElementById('s-pw').value;
  const pw2 = document.getElementById('s-pw2').value;
  if (pw.length < 6)  { showToast('Password must be at least 6 characters.', 'error'); return; }
  if (pw !== pw2)     { showToast('Passwords do not match.', 'error'); return; }
  if (!document.getElementById('s-terms').checked) { showToast('Please accept the Terms of Service.', 'error'); return; }

  const btn = document.getElementById('btn-signup');
  setLoading(btn, true);
  _signupInProgress = true;
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await setDoc(doc(db, 'pending_users', cred.user.uid), {
      uid: cred.user.uid,
      firstName: v('s-fname'), lastName: v('s-lname'),
      fullName: v('s-fname') + ' ' + v('s-lname'),
      email, phone: v('s-phone'),
      role: 'student', status: 'active',
      emailVerified: false, createdAt: serverTimestamp(),
    });
    await sendEmailVerification(cred.user);
    await signOut(auth);
    _signupInProgress = false;
    showVerifyBanner(email);
    setLoading(btn, false);
  } catch(e) {
    const authErrMsgs = {
      'auth/email-already-in-use': 'An account with this email already exists.',
      'auth/invalid-email':        "That doesn't look like a valid email address.",
      'auth/weak-password':        'Password is too weak — use at least 6 characters.',
    };
    _signupInProgress = false;
    showToast(authErrMsgs[e.code] || 'Something went wrong — please try again', 'error');
    setLoading(btn, false);
  }
};

// ── PASSWORD RESET ──
async function handlePasswordReset(email, anchorEl) {
  if (!email) { showToast('Enter your email address first, then click Forgot password.', 'error'); return; }
  const existing = document.getElementById('reset-feedback');
  if (existing) existing.remove();
  try {
    await sendPasswordResetEmail(auth, email);
    const div = document.createElement('div');
    div.id = 'reset-feedback';
    div.style.cssText = 'background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:10px;padding:.85rem 1rem;margin-top:.75rem;font-family:var(--mono);font-size:.72rem;color:#22C55E;line-height:1.65;';
    div.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;vertical-align:middle;margin-right:.3rem"><polyline points="20 6 9 17 4 12"></polyline></svg> Reset email sent to <strong style="color:var(--white);">${email}</strong><br><br>
      <span style="color:var(--gray);">Check <strong style="color:var(--white);">Spam</strong> / <strong style="color:var(--white);">Promotions</strong> if you don't see it.</span>`;
    if (anchorEl) {
      const fg = anchorEl.closest('.form-group') || anchorEl.parentNode;
      if (fg) fg.insertAdjacentElement('afterend', div);
    }
  } catch(e) {
    const msgs = {
      'auth/invalid-email':       'That email address is not valid.',
      'auth/too-many-requests':   'Too many requests. Wait a few minutes.',
      'auth/user-not-found':      'No account found with this email.',
    };
    showToast(msgs[e.code] || 'Reset failed — check your email and try again', 'error');
  }
}

document.getElementById('forgot-link').addEventListener('click', async e => {
  e.preventDefault();
  await handlePasswordReset(document.getElementById('login-email').value.trim(), e.target);
});

// ── RESEND VERIFICATION ──
window.resendVerification = async function(email, btn) {
  const pw = prompt('Enter your password to resend the verification email:');
  if (!pw) return;
  btn.textContent = 'Sending…'; btn.disabled = true;
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pw);
    if (cred.user.emailVerified) {
      await signOut(auth);
      showToast('Email already verified — you can log in!', 'success');
      setTimeout(() => { window.location.href = 'auth.html'; }, 1500);
      return;
    }
    await sendEmailVerification(cred.user);
    await signOut(auth);
    showToast('Verification email resent — check your inbox.', 'success');
  } catch(e) {
    showToast(e.code === 'auth/wrong-password' ? 'Wrong password entered' : 'Could not resend — check your connection', 'error');
  }
  btn.textContent = 'Resend Verification Email'; btn.disabled = false;
};

  }
};

// ── WELCOME EMAIL (replace with your own EmailJS config) ──
const EMAILJS_SERVICE_ID       = 'YOUR_SERVICE_ID';
const EMAILJS_TEMPLATE_STUDENT = 'YOUR_STUDENT_TEMPLATE_ID';
const EMAILJS_PUBLIC_KEY       = 'YOUR_EMAILJS_PUBLIC_KEY';

async function sendWelcomeEmail(email, firstName) {
  try {
    if (!window.emailjs) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
      window.emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
    }
    await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_STUDENT, {
      to_email:      email,
      to_name:       firstName || 'Student',
      dashboard_url: 'student-dashboard.html',
      platform_name: 'codeSchool',
    });
  } catch(e) { console.warn('Welcome email failed:', e); }
}
</script>
