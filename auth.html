<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Login or Signup — codeSchool</title>
<meta name="description" content="Create your codeSchool account or sign in to continue learning.">
<meta name="theme-color" content="#050B1A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="codeSchool">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root {
  --blue:#0693e3;--blue-mid:#0693e3;--blue-glow:#0693e3;
  --red:#cf2e2e;--red-bright:#ff6900;
  --white:#ffffff;--dark:#000000;--dark2:#1a1a1a;--dark3:#222222;
  --surface:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);
  --gray:#abb8c3;--gray2:#8ed1fc;
  --green:#0693e3;--amber:#fcb900;--orange:#ff6900;
  --mono:'DM Mono',monospace;--display:'Syne',sans-serif;--body:'Outfit',sans-serif;
  --nav-h:60px;--bottom-h:64px;
}
html{scroll-behavior:smooth;}
body{
  font-family:var(--body);background:var(--dark);color:var(--white);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:1.5rem 1rem;overflow-x:hidden;position:relative;
}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(6,147,227,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(6,147,227,.03) 1px,transparent 1px);
  background-size:40px 40px;}
.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.bg-orb1{width:650px;height:650px;background:rgba(6,147,227,.07);top:-200px;right:-200px;animation:drift1 14s ease-in-out infinite alternate;}
.bg-orb2{width:500px;height:500px;background:rgba(232,144,32,.05);bottom:-100px;left:-150px;animation:drift2 18s ease-in-out infinite alternate;}
@keyframes drift1{from{transform:translate(0,0);}to{transform:translate(-50px,35px);}}
@keyframes drift2{from{transform:translate(0,0);}to{transform:translate(35px,-45px);}}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.9rem 2rem;background:rgba(5,11,26,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo img{height:36px;width:auto;display:block;}
  .logo{font-family:var(--display);font-weight:800;font-size:1.1rem;color:var(--white);text-decoration:none;letter-spacing:-.03em;}
.logo span{color:var(--amber);}
.nav-links{display:flex;align-items:center;gap:1rem;}
.nav-back{font-family:var(--mono);font-size:.72rem;color:var(--gray);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:.35rem;}
.nav-back:hover{color:var(--white);}

.auth-wrapper{position:relative;z-index:1;width:100%;max-width:460px;padding-top:5.5rem;padding-bottom:2rem;}

.auth-header{text-align:center;margin-bottom:1.75rem;}
.role-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(6,147,227,.1);border:1px solid rgba(6,147,227,.25);border-radius:100px;padding:.4rem 1rem;font-family:var(--mono);font-size:.68rem;color:#0693e3;letter-spacing:.04em;text-transform:uppercase;margin-bottom:1rem;}
.auth-headline{font-family:var(--display);font-size:1.9rem;font-weight:800;letter-spacing:-.04em;line-height:1.1;margin-bottom:.4rem;}
.auth-sub{font-family:var(--mono);font-size:.7rem;color:var(--gray);letter-spacing:.04em;text-transform:uppercase;}

.auth-card{background:rgba(10,18,38,.6);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);}

.tab-bar{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);background:rgba(0,0,0,.15);}
.tab-btn{padding:.95rem 1rem;background:transparent;border:none;color:var(--gray);font-family:var(--body);font-size:.85rem;font-weight:600;cursor:pointer;position:relative;transition:color .2s;letter-spacing:-.01em;}
.tab-btn::after{content:'';position:absolute;bottom:0;left:50%;right:50%;height:2px;border-radius:2px 2px 0 0;background:var(--green);transition:left .25s,right .25s;}
.tab-btn.active{color:var(--white);background:rgba(255,255,255,.02);}
.tab-btn.active::after{left:12%;right:12%;}

.tab-panel{display:none;padding:1.6rem;}
.tab-panel.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.form-group{margin-bottom:1.1rem;}
.form-label{display:block;font-family:var(--mono);font-size:.65rem;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.45rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.input-wrap{position:relative;display:flex;align-items:center;}
.input-icon{position:absolute;left:.9rem;pointer-events:none;opacity:.45;display:flex;align-items:center;}
.input-icon svg{width:16px;height:16px;stroke:var(--gray);}
.form-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);color:var(--white);font-family:var(--body);font-size:.88rem;padding:.75rem 1rem;transition:border-color .2s,background .2s,box-shadow .2s;outline:none;-webkit-appearance:none;}
.has-icon .form-input{padding-left:2.6rem;}
.has-toggle .form-input{padding-right:3.4rem;}
.form-input::placeholder{color:var(--gray2);}
.form-input:focus{border-color:rgba(6,147,227,.5);background:rgba(6,147,227,.04);box-shadow:0 0 0 3px rgba(6,147,227,.1);}
.toggle-pw{position:absolute;right:.8rem;background:none;border:none;color:var(--gray);cursor:pointer;transition:color .2s;padding:.35rem .4rem;display:flex;align-items:center;}
.toggle-pw:hover{color:var(--white);}
.toggle-pw svg{width:16px;height:16px;stroke:currentColor;}
.forgot-link{display:inline-flex;align-items:center;gap:.3rem;font-family:var(--mono);font-size:.63rem;color:var(--gray);text-decoration:none;margin-top:.55rem;transition:color .2s;}
.forgot-link:hover{color:var(--green);}
.forgot-link svg{width:11px;height:11px;stroke:currentColor;opacity:.7;}

.check-row{display:flex;align-items:flex-start;gap:.65rem;margin-bottom:1.1rem;}
.check-row input[type=checkbox]{width:16px;height:16px;flex-shrink:0;margin-top:2px;accent-color:var(--green);cursor:pointer;}
.check-row label{font-family:var(--mono);font-size:.65rem;color:var(--gray);line-height:1.6;cursor:pointer;}
.check-row a{color:var(--green);text-decoration:none;}
.check-row a:hover{text-decoration:underline;}

.notice-box{background:rgba(6,147,227,.07);border:1px solid rgba(6,147,227,.2);border-radius:var(--radius-sm);padding:.75rem 1rem;margin-bottom:1.1rem;display:flex;gap:.5rem;align-items:flex-start;}
.notice-body{font-family:var(--mono);font-size:.65rem;color:rgba(255,255,255,.7);line-height:1.7;}
.notice-body strong{color:var(--white);}

.btn-submit{width:100%;padding:.9rem 1rem;border:none;border-radius:var(--radius-sm);font-family:var(--display);font-size:.92rem;font-weight:700;letter-spacing:-.01em;cursor:pointer;transition:opacity .2s,transform .15s,box-shadow .2s;margin-top:.25rem;background:linear-gradient(135deg,#0466be,var(--green));color:#fff;box-shadow:0 4px 24px rgba(6,147,227,.35);}
.btn-submit:active{transform:scale(.98);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}

.or-divider{display:flex;align-items:center;gap:.75rem;margin:.9rem 0;}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}
.or-divider span{font-family:var(--mono);font-size:.6rem;color:var(--gray2);letter-spacing:.08em;text-transform:uppercase;}

.social-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.btn-social{width:100%;display:flex;align-items:center;justify-content:center;gap:.7rem;padding:.82rem 1rem;border-radius:var(--radius-sm);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--white);font-family:var(--body);font-size:.88rem;font-weight:500;cursor:pointer;transition:background .2s,border-color .2s,box-shadow .2s;}
.btn-social:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.22);box-shadow:0 4px 16px rgba(0,0,0,.2);}
.btn-social:disabled{opacity:.5;cursor:not-allowed;}

.helper-txt{text-align:center;font-family:var(--mono);font-size:.65rem;color:var(--gray);margin-top:1.1rem;}
.helper-txt a{color:var(--green);text-decoration:none;}
.helper-txt a:hover{text-decoration:underline;}

@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:.5rem;vertical-align:middle;}
.toast{position:fixed;top:0;left:0;right:0;background:var(--dark2);border-bottom:3px solid rgba(6,147,227,.5);padding:.7rem 1.5rem;font-family:var(--mono);font-size:.75rem;color:var(--white);z-index:9999;transform:translateY(-100%);opacity:0;transition:transform .25s ease,opacity .25s;box-shadow:0 4px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:.6rem;min-height:44px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-bottom-color:rgba(6,147,227,.7);background:rgba(5,25,12,.97);}
.toast.error{border-bottom-color:rgba(232,144,32,.7);background:rgba(28,5,8,.97);}

@media(max-width:520px){
  body{padding:1rem .75rem;justify-content:flex-start;}
  .auth-wrapper{padding-top:5rem;}
  .auth-headline{font-size:1.5rem;}
  .form-row{grid-template-columns:1fr;}
  .tab-panel{padding:1.4rem 1.1rem;}
  nav{padding:.75rem 1rem;}
  .social-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div id="page-loader" style="position:fixed;inset:0;z-index:9999;background:#050B1A;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;transition:opacity .4s;">
  <img src="mra.png" alt="codeSchool" style="height:56px;width:auto;animation:loaderPulse 1.5s ease-in-out infinite;">
  <div style="width:180px;height:2px;background:rgba(6,147,227,.15);border-radius:2px;overflow:hidden;">
    <div style="height:100%;background:#0693e3;border-radius:2px;animation:loaderBar 1.5s ease-in-out infinite;"></div>
  </div>
</div>
<style>
@keyframes loaderPulse{0%,100%{opacity:.6;transform:scale(.97)}50%{opacity:1;transform:scale(1)}}
@keyframes loaderBar{0%{width:0;margin-left:0}60%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
</style>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>

<nav>
  <a href="index.html" class="logo"><img src="mra.png" alt="codeSchool" style="height:36px;width:auto;object-fit:contain;display:block;"></a>
  <div class="nav-links">
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Home
    </a>
  </div>
</nav>

<div class="auth-wrapper">

  <div class="auth-header">
    <div class="role-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      Student Portal
    </div>
    <div class="auth-headline">Welcome back</div>
    <div class="auth-sub">Sign in or create your account</div>
  </div>

  <div class="auth-card">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Log In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="tab-panel active" id="panel-login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrap has-icon">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><polyline points="2,4 12,13 22,4"></polyline></svg></span>
          <input type="email" class="form-input" placeholder="you@example.com" id="login-email" autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap has-icon has-toggle">
          <span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"></circle><path d="M21 2l-9.6 9.6"></path><path d="M15.5 7.5l3 3L22 7l-3-3"></path></svg></span>
          <input type="password" class="form-input" placeholder="Your password" id="login-pw" autocomplete="current-password">
          <button class="toggle-pw" onclick="togglePw('login-pw',this)" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
        <a href="#" class="forgot-link" id="forgot-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          Forgot password?
        </a>
      </div>
      <button class="btn-submit" id="btn-login" onclick="handleLogin()" data-label="Log In →">Log In →</button>
      
      <div class="or-divider"><span>or continue with</span></div>
      <div class="social-row">
        <button class="btn-social" id="btn-google" onclick="handleGoogleSignIn()" type="button">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.83l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Google
        </button>
        <button class="btn-social" id="btn-github" onclick="handleGithubSignIn()" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </button>
      </div>
      <div class="helper-txt">No account? <a href="#" onclick="switchTab('signup');return false;">Create one free</a></div>
    </div>

    <!-- SIGN UP PANEL -->
    <div class="tab-panel" id="panel-signup">
      <div class="notice-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;flex-shrink:0;margin-top:1px"><path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8"></path><polyline points="22 7 12 13 2 7"></polyline><polyline points="16 19 19 22 22 19"></polyline><line x1="19" y1="15" x2="19" y2="22"></line></svg>
        <div class="notice-body">
          After signing up, <strong>check your inbox and spam folder</strong> for a verification link before logging in.
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-input" placeholder="Ada" id="s-fname" autocomplete="given-name"></div>
        <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-input" placeholder="Okafor" id="s-lname" autocomplete="family-name"></div>
      </div>
      <div class="form-group"><label class="form-label">Email Address</label><div class="input-wrap has-icon"><span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><polyline points="2,4 12,13 22,4"></polyline></svg></span><input type="email" class="form-input" placeholder="you@example.com" id="s-email" autocomplete="email"></div></div>
      <div class="form-group"><label class="form-label">Phone Number</label><div class="input-wrap has-icon"><span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></span><input type="tel" class="form-input" placeholder="080x xxx xxxx" id="s-phone" autocomplete="tel"></div></div>
      <div class="form-group"><label class="form-label">Password</label><div class="input-wrap has-icon has-toggle"><span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"></circle><path d="M21 2l-9.6 9.6"></path><path d="M15.5 7.5l3 3L22 7l-3-3"></path></svg></span><input type="password" class="form-input" placeholder="Min. 6 characters" id="s-pw" autocomplete="new-password"><button class="toggle-pw" onclick="togglePw('s-pw',this)" type="button"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button></div></div>
      <div class="form-group"><label class="form-label">Confirm Password</label><div class="input-wrap has-icon has-toggle"><span class="input-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"></circle><path d="M21 2l-9.6 9.6"></path><path d="M15.5 7.5l3 3L22 7l-3-3"></path></svg></span><input type="password" class="form-input" placeholder="Repeat password" id="s-pw2" autocomplete="new-password"><button class="toggle-pw" onclick="togglePw('s-pw2',this)" type="button"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button></div></div>
      <div class="check-row"><input type="checkbox" id="s-terms"><label for="s-terms">I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a></label></div>
      <button class="btn-submit" id="btn-signup" onclick="handleSignup()" data-label="Create Account →">Create Account →</button>
      <div class="helper-txt">Already have an account? <a href="#" onclick="switchTab('login');return false;">Log in</a></div>
    </div>
  </div>

</div>

<div id="toast" class="toast"></div>

<script>
window.handleLogin        = function(){ showToast('App loading — please wait a moment.','error'); };
window.handleSignup       = function(){ showToast('App loading — please wait a moment.','error'); };
window.handleGoogleSignIn = function(){ showToast('App loading — please wait a moment.','error'); };

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'   + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

function togglePw(id, btn) {
  const inp  = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type   = show ? 'text' : 'password';
  btn.innerHTML = show ? EYE_OFF : EYE_ON;
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (type||'');
  setTimeout(() => t.classList.remove('show'), 3200);
}

function setLoading(btn, loading) {
  btn.disabled  = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>Please wait…' : (btn.dataset.label || btn.textContent);
}

document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') window.handleLogin(); });

document.getElementById('s-pw2').addEventListener('keydown', e => { if (e.key === 'Enter') window.handleSignup(); });

<script type="module">

let _socialInProgress = false;

// ── Process social sign-in result ───────────────────────────────
async function processSocialUser(user, providerId) {
  try {
    const snap = await getDoc(doc(db, "users", user.uid));

    if (snap.exists()) {
      const profile = snap.data();
      // ── Bug fix: this is the STUDENT auth page — block non-students ──
      if (profile.role === 'tutor' || profile.role === 'admin') {
        showToast(`This is a ${profile.role} account. Please use the ${profile.role === 'tutor' ? 'Tutor Login' : 'Staff Portal'} instead.`, 'error');
        await signOut(auth);
        _socialInProgress = false;
        return;
      }
      if (profile.status === "suspended") {
        showToast("Account suspended. Contact support.", "error");
        await signOut(auth);
        _socialInProgress = false;
        return;
      }
      showToast("Welcome back!", "success");
      _socialInProgress = false;
      setTimeout(() => { window.location.href = "student-dashboard.html"; }, 700);
      return;
    }

    // Check if user exists by email (password account being linked)
    const emailQ = query(collection(db, "users"), where("email", "==", user.email || ""));
    const emailSnap = await getDocs(emailQ);

    if (!emailSnap.empty) {
      const existingDoc = emailSnap.docs[0];
      const existingData = existingDoc.data();
      const existingUID = existingDoc.id;

      // ── Bug fix: block non-student roles even via email merge ──
      if (existingData.role === 'tutor' || existingData.role === 'admin') {
        showToast(`This email belongs to a ${existingData.role} account. Please use the ${existingData.role === 'tutor' ? 'Tutor Login' : 'Staff Portal'}.`, 'error');
        await signOut(auth);
        _socialInProgress = false;
        return;
      }

      if (existingData.status === "suspended") {
        showToast("Account suspended. Contact support.", "error");
        await signOut(auth);
        _socialInProgress = false;
        return;
      }
      await setDoc(doc(db, "users", user.uid), {
        uid: user.uid,
        firstName: existingData.firstName || "",
        lastName: existingData.lastName || "",
        fullName: existingData.fullName || user.displayName || "",
        email: user.email || existingData.email,
        phone: existingData.phone || "",
        role: "student",
        status: existingData.status || "active",
        emailVerified: true,
        provider: providerId,
        mergedFrom: existingUID,
        createdAt: existingData.createdAt || serverTimestamp(),
      });
      await updateDoc(doc(db, "users", existingUID), { [`${providerId}UID`]: user.uid });
      showToast("Accounts linked! Welcome back.", "success");
      _socialInProgress = false;
      setTimeout(() => { window.location.href = "student-dashboard.html"; }, 900);
      return;
    }

    // Brand new user — create as student
    const nameParts = (user.displayName || "").split(" ");
    const firstName = nameParts[0] || "Student";
    const lastName  = nameParts.slice(1).join(" ") || "";

    await setDoc(doc(db, "users", user.uid), {
      uid: user.uid, firstName, lastName,
      fullName: user.displayName || firstName,
      email: user.email || "", phone: "",
      role: "student", status: "active",
      emailVerified: true,
      provider: providerId,
      createdAt: serverTimestamp(),
    });
    showToast("Account created! Welcome to MRA Africa.", "success");
    _socialInProgress = false;
    setTimeout(() => { window.location.href = "student-dashboard.html"; }, 900);

  } catch (err) {

    showToast("Sign-in failed. Check the console for details.", "error");
    await signOut(auth).catch(e =>
    _socialInProgress = false;
  }
}

// ── Handle social sign-in errors ────────────────────────────────
function handleSocialError(e, providerName, btnId) {

  if (e.email)
  if (e.credential)

  if (e.code === 'auth/popup-closed-by-user') {
    showToast('Sign-in cancelled.', '');
  } else if (e.code === 'auth/account-exists-with-different-credential') {
    showToast('An account already exists with this email. Try logging in with your password.', 'error');
  } else if (e.code === 'auth/popup-blocked') {
    showToast('Popup was blocked. Please allow popups for this site.', 'error');
  } else if (e.code === 'auth/cancelled-popup-request') {
    showToast('Another sign-in is in progress.', 'warning');
  } else if (e.code === 'auth/operation-not-allowed') {
    showToast(`${providerName} sign-in is not enabled. Check Firebase Console.`, 'error');
  } else if (e.code === 'auth/invalid-api-key') {
    showToast('Configuration error. Contact support.', 'error');
  } else {
    showToast(`${providerName} sign-in failed — see console for details.`, 'error');
  }
  _socialInProgress = false;
  resetSocialBtn(btnId);
}

  } else {
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg> GitHub';
  }
}

// ── AUTO-REDIRECT IF LOGGED IN ──────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user || _socialInProgress) return;
  try {
    const snap = await getDoc(doc(db, "users", user.uid));
    if (!snap.exists()) return;
    const role = snap.data().role;
    const dashboards = { student: "student-dashboard.html", admin: "admin-dashboard.html", tutor: "tutor-dashboard.html" };
    window.location.href = dashboards[role] || "student-dashboard.html";
  } catch (e) {}
});

// ── LOGIN ──────────────────────────────────────────────────────
window.handleLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  const btn   = document.getElementById('btn-login');

  if (!email || !pw) { showToast('Please enter your email and password.', 'error'); return; }
  setLoading(btn, true);

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pw);
    const snapPre = await getDoc(doc(db, 'users', cred.user.uid));

    const isAdminVerified = snapPre.exists() && snapPre.data().isVerified === true;
    if (!cred.user.emailVerified && !isAdminVerified) {
      await signOut(auth);
      setLoading(btn, false);
      showVerificationPrompt(email);
      return;
    }

    let profile;
    if (!snapPre.exists()) {
      const pendingSnap = await getDoc(doc(db, 'pending_users', cred.user.uid));
      if (!pendingSnap.exists()) {
        showToast('Account not found. Please sign up.', 'error');
        await signOut(auth);
        setLoading(btn, false);
        return;
      }
      const pendingData = pendingSnap.data();
      await setDoc(doc(db, 'users', cred.user.uid), { ...pendingData, emailVerified: true });
      try { await deleteDoc(doc(db, 'pending_users', cred.user.uid)); } catch(_) {}
      profile = pendingData;
    } else {
      profile = snapPre.data();
    }

    if (profile.role !== 'student') {
      showToast('This is not a student account.', 'error');
      await signOut(auth);
      setLoading(btn, false);
      return;
    }

    if (profile.status === 'suspended') {
      showToast('Account suspended. Contact support.', 'error');
      await signOut(auth);
      setLoading(btn, false);
      return;
    }

    showToast('Welcome back!', 'success');
    setTimeout(() => { window.location.href = 'student-dashboard.html'; }, 800);

  } catch(e) {
    const msgs = {
      'auth/user-not-found': 'No account with this email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/too-many-requests': 'Too many attempts. Try again later.',
      'auth/invalid-credential': 'Email or password is incorrect.',
    };
    showToast(msgs[e.code] || 'Sign-in failed', 'error');
    setLoading(btn, false);
  }
};

// ── SIGNUP ─────────────────────────────────────────────────────
window.handleSignup = async function() {
  const v     = (id) => document.getElementById(id)?.value.trim();
  const email = v("s-email");
  const pw    = document.getElementById("s-pw").value;
  const pw2   = document.getElementById("s-pw2").value;

  if (!v("s-fname") || !v("s-lname") || !email || !v("s-phone")) {
    showToast("Please fill in all fields.", "error"); return;
  }
  if (pw.length < 6) { showToast("Password must be at least 6 characters.", "error"); return; }
  if (pw !== pw2)    { showToast("Passwords do not match.", "error"); return; }
  if (!document.getElementById("s-terms").checked) {
    showToast("Please accept the Terms of Service.", "error"); return;
  }

  const btn = document.getElementById("btn-signup");
  setLoading(btn, true);

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await setDoc(doc(db, "pending_users", cred.user.uid), {
      uid: cred.user.uid,
      firstName: v("s-fname"), lastName: v("s-lname"),
      fullName: v("s-fname") + " " + v("s-lname"),
      email, phone: v("s-phone"),
      role: "student", status: "active",
      emailVerified: false,
      createdAt: serverTimestamp(),
    });
    await sendEmailVerification(cred.user);
    await signOut(auth);
    showVerifyBanner(email);
    setLoading(btn, false);
  } catch (e) {
    const msgs = {
      "auth/email-already-in-use": "An account with this email already exists.",
      "auth/invalid-email": "Invalid email address.",
      "auth/weak-password": "Password too weak — use at least 6 characters.",
    };
    showToast(msgs[e.code] || "Something went wrong — please try again", "error");
    setLoading(btn, false);
  }
};

// ── GOOGLE SIGN-IN (POPUP) ─────────────────────────────────────
window.handleGoogleSignIn = async function() {
  if (_socialInProgress) {
    _socialInProgress = false;
  }
  _socialInProgress = true;
  const btn = document.getElementById('btn-google');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Signing in…'; }

  try {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    const result = await signInWithPopup(auth, provider);
    await processSocialUser(result.user, "google");
  } catch(e) {
    handleSocialError(e, 'Google', 'btn-google');
  }
};

// ── GITHUB SIGN-IN (POPUP) ─────────────────────────────────────
window.handleGithubSignIn = async function() {
  if (_socialInProgress) {
    _socialInProgress = false;
  }
  _socialInProgress = true;
  const btn = document.getElementById('btn-github');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Signing in…'; }

  try {
    const provider = new GithubAuthProvider();

    const result = await signInWithPopup(auth, provider);
    await processSocialUser(result.user, "github");
  } catch(e) {
    handleSocialError(e, 'GitHub', 'btn-github');
  }
};

// ── PASSWORD RESET ─────────────────────────────────────────────
document.getElementById('forgot-link').addEventListener('click', async e => {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showToast('Enter your email first.', 'error'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showToast('Password reset email sent — check your inbox.', 'success');
  } catch(er2) {
    showToast('Could not send reset email. Try again.', 'error');
  }
});

// ── VERIFICATION FLOW ──────────────────────────────────────────
function showVerificationPrompt(email) {
  const existing = document.getElementById("unverified-prompt");
  if (existing) existing.remove();
  
  const div = document.createElement("div");
  div.id = "unverified-prompt";
  div.style.cssText = "background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:.85rem 1rem;margin-top:.75rem;font-family:var(--mono);font-size:.72rem;color:#F59E0B;line-height:1.65;";
  div.innerHTML = `
    <strong>Email not verified.</strong><br>Check your inbox for a verification link.<br>Also check <strong>Spam</strong> / <strong>Promotions</strong>.<br><br>
    <button onclick="resendVerification('${email}',this)" style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);border-radius:6px;padding:.35rem .85rem;color:#F59E0B;font-family:var(--mono);font-size:.68rem;cursor:pointer;">Resend Verification Email</button>`;
  
  const fg = document.getElementById("login-email").closest(".form-group");
  if (fg) fg.insertAdjacentElement("afterend", div);
  showToast("Verify your email before logging in.", "error");
}

function showVerifyBanner(email) {
  const card = document.querySelector(".auth-card");
  if (!card) return;
  card.innerHTML = `
    <div style="text-align:center;padding:2rem 1.6rem;">
      <div style="font-family:var(--display);font-size:1.3rem;font-weight:800;margin-bottom:.6rem;">Verify Your Email</div>
      <div style="font-family:var(--mono);font-size:.78rem;color:var(--gray);line-height:1.7;margin-bottom:1rem;">We sent a verification link to<br><strong style="color:var(--white);">${email}</strong><br><br>Click that link, then come back here to log in.</div>
      <button style="width:100%;padding:.8rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:var(--white);font-family:var(--mono);font-size:.72rem;cursor:pointer;margin-bottom:.75rem;" onclick="resendVerification('${email}',this)">Resend Verification Email</button>
      <a href="auth.html" style="font-family:var(--mono);font-size:.72rem;color:var(--gray);">Back to Login</a>
    </div>`;
}

window.resendVerification = async function(email, btn) {
  const pw = prompt("Enter your password to resend the verification email:");
  if (!pw) return;
  btn.textContent = "Sending…"; btn.disabled = true;
  try {
    const cred = await signInWithEmailAndPassword(auth, email, pw);
    if (cred.user.emailVerified) {
      await signOut(auth);
      showToast("Email already verified — you can log in!", "success");
      setTimeout(() => { window.location.href = "auth.html"; }, 1500);
      return;
    }
    await sendEmailVerification(cred.user);
    await signOut(auth);
    showToast("Verification email resent — check your inbox.", "success");
  } catch(e2) {
    showToast(e2.code === "auth/wrong-password" ? "Wrong password entered" : "Could not resend", "error");
  }
  btn.textContent = "Resend Verification Email"; btn.disabled = false;
};
</script>
